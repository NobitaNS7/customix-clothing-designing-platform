<!DOCTYPE html>
<html>
<head>
<title>Customix Clothing Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0e0e0e;
  --surface: #1a1a1a;
  --card: #222;
  --accent: #ff3b3b;
  --accent2: #ff7a00;
  --text: #f0f0f0;
  --muted: #888;
  --border: #333;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

header {
  background: #111;
  border-bottom: 2px solid var(--accent);
  padding: 18px 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

header h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.4rem;
  letter-spacing: 3px;
  background: linear-gradient(90deg, #ff3b3b, #ff7a00);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

header p { color: var(--muted); font-size: 0.85rem; letter-spacing: 1px; }

.main {
  display: grid;
  grid-template-columns: 220px 1fr 240px;
  gap: 0;
  min-height: calc(100vh - 70px);
}

.left-panel {
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 24px 16px;
}

.panel-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1rem;
  letter-spacing: 2px;
  color: var(--muted);
  margin-bottom: 14px;
  text-transform: uppercase;
}

.product-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  padding: 12px 14px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.95rem;
  cursor: pointer;
  margin-bottom: 8px;
  transition: all 0.2s;
  text-align: left;
}

.product-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(255,59,59,0.05); }
.product-btn.active { border-color: var(--accent); background: rgba(255,59,59,0.12); color: var(--accent); }
.product-icon { font-size: 1.4rem; }
.color-section { margin-top: 28px; }

.color-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}

.color-swatch {
  width: 100%;
  aspect-ratio: 1;
  border-radius: 6px;
  border: 2px solid transparent;
  cursor: pointer;
  transition: transform 0.15s, border-color 0.15s;
}

.color-swatch:hover { transform: scale(1.1); }
.color-swatch.active { border-color: white; transform: scale(1.1); }

.center {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 30px;
  background: var(--bg);
}

.canvas-wrap {
  position: relative;
  width: 420px;
  height: 420px;
  background: #1c1c1c;
  border-radius: 16px;
  border: 1px solid var(--border);
  overflow: hidden;
  box-shadow: 0 0 60px rgba(255,59,59,0.08);
}

.canvas-wrap svg#product-svg {
  position: absolute;
  left: 0; top: 0;
  width: 420px; height: 420px;
  pointer-events: none;
  z-index: 1;
}

#designCanvas {
  position: absolute;
  left: 0; top: 0;
  z-index: 2;
}

.tools-row {
  display: flex;
  gap: 10px;
  margin-top: 20px;
  flex-wrap: wrap;
  justify-content: center;
}

.tool-btn {
  padding: 10px 18px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}

.tool-btn:hover { border-color: var(--accent); color: var(--accent); }
.tool-btn.danger:hover { border-color: #ff4444; color: #ff4444; }

.download-btn {
  margin-top: 16px;
  padding: 14px 36px;
  background: linear-gradient(90deg, #ff3b3b, #ff7a00);
  border: none;
  border-radius: 10px;
  color: white;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.2rem;
  letter-spacing: 2px;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.2s;
}

.download-btn:hover { opacity: 0.88; transform: scale(1.02); }

.right-panel {
  background: var(--surface);
  border-left: 1px solid var(--border);
  padding: 24px 16px;
}

.ai-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 14px;
}

.ai-box textarea {
  width: 100%;
  background: transparent;
  border: none;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.88rem;
  resize: none;
  outline: none;
  min-height: 80px;
}

.ai-btn {
  width: 100%;
  padding: 11px;
  background: linear-gradient(90deg, #ff3b3b, #ff7a00);
  border: none;
  border-radius: 8px;
  color: white;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1rem;
  letter-spacing: 1px;
  cursor: pointer;
  margin-top: 8px;
}

.file-label {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  background: var(--card);
  border: 1px dashed var(--border);
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.88rem;
  color: var(--muted);
  transition: border-color 0.2s;
  margin-bottom: 8px;
}

.file-label:hover { border-color: var(--accent); color: var(--accent); }
#uploadImage { display: none; }
.hint { font-size: 0.75rem; color: var(--muted); margin-top: 12px; text-align: center; }
</style>
</head>
<body>

<header>
  <div>
    <h1>CUSTOMIX</h1>
    <p>AI POWERED CUSTOM CLOTHING STUDIO</p>
  </div>
</header>

<div class="main">

  <div class="left-panel">
    <div class="panel-title">Product</div>
    <button class="product-btn active" onclick="changeProduct('tshirt', this)">
      <span class="product-icon">👕</span> T-Shirt
    </button>
    <button class="product-btn" onclick="changeProduct('hoodie', this)">
      <span class="product-icon">🧥</span> Hoodie
    </button>
    <button class="product-btn" onclick="changeProduct('shoes', this)">
      <span class="product-icon">👟</span> Shoes
    </button>
    <button class="product-btn" onclick="changeProduct('cap', this)">
      <span class="product-icon">🧢</span> Cap
    </button>
    <button class="product-btn" onclick="changeProduct('towel', this)">
      <span class="product-icon">🛁</span> Towel
    </button>

    <div class="color-section">
      <div class="panel-title" style="margin-top:0">Color</div>
      <div class="color-grid">
        <div class="color-swatch active" style="background:#ffffff" onclick="changeColor('#ffffff', this)" title="White"></div>
        <div class="color-swatch" style="background:#111111;border-color:#444" onclick="changeColor('#111111', this)" title="Black"></div>
        <div class="color-swatch" style="background:#e02020" onclick="changeColor('#e02020', this)" title="Red"></div>
        <div class="color-swatch" style="background:#1e5ef3" onclick="changeColor('#1e5ef3', this)" title="Blue"></div>
        <div class="color-swatch" style="background:#20a840" onclick="changeColor('#20a840', this)" title="Green"></div>
        <div class="color-swatch" style="background:#f5c518" onclick="changeColor('#f5c518', this)" title="Yellow"></div>
        <div class="color-swatch" style="background:#8a2be2" onclick="changeColor('#8a2be2', this)" title="Purple"></div>
        <div class="color-swatch" style="background:#ff8c00" onclick="changeColor('#ff8c00', this)" title="Orange"></div>
      </div>
    </div>
  </div>

  <div class="center">
    <div class="canvas-wrap">
      <svg id="product-svg" viewBox="0 0 420 420" xmlns="http://www.w3.org/2000/svg"></svg>
      <canvas id="designCanvas" width="420" height="420"></canvas>
    </div>

    <div class="tools-row">
      <button class="tool-btn" onclick="addText()">✏️ Add Text</button>
      <label class="tool-btn" for="uploadImage">🖼️ Upload Image</label>
      <input type="file" id="uploadImage" accept="image/*" onchange="addImage()">
      <button class="tool-btn danger" onclick="deleteObject()">🗑️ Delete</button>
    </div>

    <button class="download-btn" onclick="downloadDesign()">⬇ DOWNLOAD DESIGN</button>
    <p class="hint">Double-click text to edit • Drag to move</p>
  </div>

  <div class="right-panel">
    <div class="panel-title">AI Design Helper</div>
    <div class="ai-box">
      <textarea id="aiPrompt" placeholder="Describe your design idea... e.g. 'fire dragon logo', 'vintage sunset'"></textarea>
      <button class="ai-btn" onclick="generateAIText()">✨ GENERATE IDEA</button>
    </div>

    <div class="panel-title" style="margin-top:20px">Upload Art</div>
    <label class="file-label" for="uploadImage">
      📁 Click to upload image / logo
    </label>

    <div class="panel-title" style="margin-top:20px">Tips</div>
    <p style="font-size:0.82rem;color:var(--muted);line-height:1.6">
      • Select product first, then pick color<br>
      • Add text and images inside the dotted print area<br>
      • Double-click text to edit it<br>
      • Download saves your full design
    </p>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.2.4/fabric.min.js"></script>
<script>

var currentProduct = 'tshirt';
var currentColor   = '#ffffff';

var canvas = new fabric.Canvas('designCanvas', { preserveObjectStacking: true });

var printArea = new fabric.Rect({
  left: 145, top: 140, width: 140, height: 170,
  fill: 'transparent', stroke: 'rgba(255,255,255,0.3)',
  strokeDashArray: [5, 5], selectable: false, evented: false
});
canvas.add(printArea);

var svgShapes = {
  tshirt: function(c) {
    return `<g fill="${c}" stroke="#0008" stroke-width="1.5">
      <path d="M120,100 L80,160 L120,170 L120,340 L300,340 L300,170 L340,160 L300,100
               C300,100 275,80 255,90 C245,130 175,130 165,90 C145,80 120,100 120,100 Z"/>
    </g>`;
  },
  hoodie: function(c) {
    return `<g fill="${c}" stroke="#0008" stroke-width="1.5">
      <path d="M115,110 L70,175 L115,185 L115,345 L305,345 L305,185 L350,175 L305,110
               C305,110 280,85 255,95 L245,115 C235,145 185,145 175,115 L165,95
               C140,85 115,110 115,110 Z"/>
      <path d="M165,95 C165,95 155,60 175,50 L210,45 L245,50 C265,60 255,95 255,95
               C245,115 185,145 175,115 Z" fill="${c}" stroke="#0008" stroke-width="1.5"/>
      <rect x="165" y="240" width="90" height="50" rx="6" fill="${adjustColor(c,-20)}" stroke="#0006" stroke-width="1"/>
      <line x1="210" y1="110" x2="210" y2="245" stroke="#0004" stroke-width="2.5" stroke-dasharray="4,3"/>
    </g>`;
  },
  shoes: function(c) {
    return `<g fill="${c}" stroke="#0008" stroke-width="1.5">
      <ellipse cx="210" cy="320" rx="130" ry="22" fill="${adjustColor(c,-40)}"/>
      <path d="M90,310 C90,250 130,200 175,185 L220,180 L270,185 C300,195 330,240 330,310 Z"/>
      <path d="M90,310 C90,290 130,275 175,272 L210,270 C230,270 250,272 270,278 C300,288 330,305 330,310 Z" fill="${adjustColor(c,20)}"/>
      <rect x="295" y="230" width="28" height="55" rx="8" fill="${adjustColor(c,10)}"/>
      <rect x="155" y="190" width="110" height="70" rx="6" fill="${adjustColor(c,15)}" stroke="#0005" stroke-width="1"/>
      ${[0,1,2,3].map(i=>`<line x1="160" y1="${203+i*16}" x2="258" y2="${203+i*16}" stroke="#fff9" stroke-width="2.5"/>`).join('')}
      <path d="M280,240 Q240,260 200,255 Q230,250 275,235 Z" fill="white" opacity="0.25"/>
    </g>`;
  },
  cap: function(c) {
    return `<g fill="${c}" stroke="#0008" stroke-width="1.5">
      <ellipse cx="210" cy="295" rx="155" ry="22" fill="${adjustColor(c,-30)}"/>
      <path d="M55,295 Q100,320 180,318 L240,318 Q320,320 365,295 L355,285 Q310,305 240,302 L180,302 Q110,305 65,285 Z" fill="${adjustColor(c,-35)}"/>
      <path d="M80,295 C80,210 130,145 210,140 C290,145 340,210 340,295 Z"/>
      <circle cx="210" cy="143" r="12" fill="${adjustColor(c,-20)}" stroke="#0006" stroke-width="1"/>
      <path d="M140,155 Q210,145 280,155 Q275,220 210,230 Q145,220 140,155 Z" fill="${adjustColor(c,15)}" stroke="#0005" stroke-width="1"/>
    </g>`;
  },
  towel: function(c) {
    return `<g fill="${c}" stroke="#0008" stroke-width="1.5">
      <rect x="95" y="100" width="230" height="280" rx="10"/>
      <rect x="95" y="100" width="230" height="28" rx="10" fill="${adjustColor(c,-30)}"/>
      <rect x="95" y="352" width="230" height="28" rx="10" fill="${adjustColor(c,-30)}"/>
      ${Array.from({length:12},(_,i)=>`<line x1="105" y1="${140+i*16}" x2="315" y2="${140+i*16}" stroke="${adjustColor(c,20)}" stroke-width="3" opacity="0.35"/>`).join('')}
      <rect x="196" y="90" width="28" height="16" rx="5" fill="${adjustColor(c,-20)}"/>
    </g>`;
  }
};

function adjustColor(hex, amount) {
  var r = parseInt(hex.slice(1,3),16);
  var g = parseInt(hex.slice(3,5),16);
  var b = parseInt(hex.slice(5,7),16);
  r = Math.min(255, Math.max(0, r + amount));
  g = Math.min(255, Math.max(0, g + amount));
  b = Math.min(255, Math.max(0, b + amount));
  return '#' + [r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

function renderProduct() {
  var svg = document.getElementById('product-svg');
  var shapeFn = svgShapes[currentProduct];
  if (!shapeFn) return;
  svg.innerHTML = shapeFn(currentColor);
}

function changeProduct(product, btn) {
  currentProduct = product;
  document.querySelectorAll('.product-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  var areas = {
    tshirt:  { left:145, top:140, width:140, height:170 },
    hoodie:  { left:148, top:145, width:130, height:165 },
    shoes:   { left:155, top:195, width:110, height:80  },
    cap:     { left:155, top:155, width:110, height:70  },
    towel:   { left:120, top:138, width:180, height:200 }
  };
  var a = areas[product] || areas.tshirt;
  printArea.set({ left: a.left, top: a.top, width: a.width, height: a.height });
  canvas.renderAll();
  renderProduct();
}

function changeColor(color, swatch) {
  currentColor = color;
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
  if (swatch) swatch.classList.add('active');
  renderProduct();
}

function addText() {
  var text = new fabric.IText('Your Text', {
    left: 185, top: 190,
    fontSize: 28, fill: '#ffffff',
    fontFamily: 'Arial', fontWeight: 'bold'
  });
  canvas.add(text);
  canvas.setActiveObject(text);
}

function addImage() {
  var input = document.getElementById('uploadImage');
  if (!input.files[0]) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    fabric.Image.fromURL(e.target.result, function(img) {
      img.scaleToWidth(120);
      img.set({ left: 165, top: 180 });
      canvas.add(img);
      canvas.setActiveObject(img);
    });
  };
  reader.readAsDataURL(input.files[0]);
}

function deleteObject() {
  var obj = canvas.getActiveObject();
  if (obj && obj !== printArea) canvas.remove(obj);
}

function downloadDesign() {
  var tempCanvas = document.createElement('canvas');
  tempCanvas.width = 420; tempCanvas.height = 420;
  var ctx = tempCanvas.getContext('2d');
  ctx.fillStyle = '#1c1c1c';
  ctx.fillRect(0,0,420,420);
  var svgEl = document.getElementById('product-svg');
  var svgData = new XMLSerializer().serializeToString(svgEl);
  var svgBlob = new Blob([svgData], {type:'image/svg+xml;charset=utf-8'});
  var url = URL.createObjectURL(svgBlob);
  var img = new Image();
  img.onload = function() {
    ctx.drawImage(img, 0, 0, 420, 420);
    URL.revokeObjectURL(url);
    var design = new Image();
    design.src = canvas.toDataURL('image/png');
    design.onload = function() {
      ctx.drawImage(design, 0, 0);
      var link = document.createElement('a');
      link.download = 'customix-design.png';
      link.href = tempCanvas.toDataURL('image/png');
      link.click();
    };
  };
  img.src = url;
}

function generateAIText() {
  var prompt = document.getElementById('aiPrompt').value.trim();
  if (!prompt) return;
  var ideas = [
    prompt.toUpperCase(),
    prompt.split(' ').map(w=>w[0].toUpperCase()+w.slice(1)).join(' '),
    '★ ' + prompt + ' ★',
    prompt.toUpperCase() + ' EST. 2024',
  ];
  var chosen = ideas[Math.floor(Math.random()*ideas.length)];
  var text = new fabric.IText(chosen, {
    left: 160, top: 190,
    fontSize: 22, fill: '#ffffff',
    fontFamily: 'Arial', fontWeight: 'bold',
    textAlign: 'center'
  });
  canvas.add(text);
  canvas.setActiveObject(text);
}

canvas.on('mouse:dblclick', function(options) {
  var obj = options.target;
  if (obj && obj.type === 'i-text') {
    obj.enterEditing();
    obj.selectAll();
    canvas.renderAll();
  }
});

renderProduct();
</script>
</body>
</html>
