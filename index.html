<!DOCTYPE html>
<html>
<head>
<title>Customix Clothing Platform</title>

<style>

body{
font-family: Arial;
text-align:center;
background:#f4f4f4;
margin:0;
}

header{
background:#111;
color:white;
padding:20px;
}

.hero{
padding:60px;
}

button{
padding:15px 25px;
background:#ff4c4c;
color:white;
border:none;
font-size:18px;
cursor:pointer;
border-radius:6px;
}

button:hover{
background:#ff2a2a;
}

</style>
</head>

<body>

<header>
<h1>Customix</h1>
<p>AI Powered Custom Clothing Platform</p>
</header>

<div class="hero">
<h2>Design Your Own T-Shirt</h2>
<p>Create custom designs with AI and preview them.</p>
</div>
<h2>Select Product</h2>

<button onclick="changeProduct('tshirt')">T-Shirt</button>
<button onclick="changeProduct('hoodie')">Hoodie</button>
<button onclick="changeProduct('shoes')">Shoes</button>
<button onclick="changeProduct('cap')">Cap</button>
<button onclick="changeProduct('towel')">Towel</button>
<h2>Design Area</h2>

<div style="position:relative;width:400px;height:400px;margin:auto">

<img id="tshirt" src="https://cdn-icons-png.flaticon.com/512/892/892458.png"
style="position:absolute;width:400px;height:400px;left:0;top:0;">

<canvas id="designCanvas" width="400" height="400"
style="position:absolute;left:0;top:0;"></canvas>

</div>

<br><br>

<button onclick="changeColor('white')">White</button>
<button onclick="changeColor('black')">Black</button>
<button onclick="changeColor('red')">Red</button>
<button onclick="changeColor('blue')">Blue</button>
<button onclick="changeColor('green')">Green</button>
<button onclick="changeColor('yellow')">Yellow</button>
<button onclick="changeColor('purple')">Purple</button>

<br><br>

<button onclick="addText()">Add Text</button>

<input type="file" id="uploadImage">
<button onclick="addImage()">Add Image</button>

<br><br>

<button onclick="downloadDesign()">Download My Design</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.2.4/fabric.min.js"></script>

<script>

var canvas = new fabric.Canvas('designCanvas');

function addText(){

var text = new fabric.Text('Your Design',{
left:150,
top:150,
fontSize:30
});

canvas.add(text);

}

function addImage(){

var input=document.getElementById("uploadImage");

var reader=new FileReader();

reader.onload=function(event){

fabric.Image.fromURL(event.target.result,function(img){

img.scaleToWidth(150);

canvas.add(img);

});

}

reader.readAsDataURL(input.files[0]);

}

function changeColor(color){

var tshirt=document.getElementById("tshirt");

if(color=="white"){
tshirt.src="https://cdn-icons-png.flaticon.com/512/892/892458.png";
}

if(color=="black"){
tshirt.src="https://cdn-icons-png.flaticon.com/512/892/892459.png";
}

if(color=="red"){
tshirt.src="https://cdn-icons-png.flaticon.com/512/892/892463.png";
}

if(color=="blue"){
tshirt.src="https://cdn-icons-png.flaticon.com/512/892/892462.png";
}

if(color=="green"){
tshirt.src="https://cdn-icons-png.flaticon.com/512/892/892461.png";
}

if(color=="yellow"){
tshirt.src="https://cdn-icons-png.flaticon.com/512/892/892460.png";
}

if(color=="purple"){
tshirt.src="https://cdn-icons-png.flaticon.com/512/892/892464.png";
}

}
function changeProduct(product){

var item = document.getElementById("tshirt");

if(product=="tshirt"){
// keep the same image you already have
}

}
function changeProduct(product){

var item = document.getElementById("tshirt");

if(product=="tshirt"){
item.src="https://cdn-icons-png.flaticon.com/512/892/892458.png";
}

if(product=="hoodie"){
item.src="https://cdn-icons-png.flaticon.com/512/892/892473.png";
}

if(product=="shoes"){
item.src="https://cdn-icons-png.flaticon.com/512/892/892472.png";
}

if(product=="cap"){
item.src="https://cdn-icons-png.flaticon.com/512/892/892471.png";
}

if(product=="towel"){
item.src="https://cdn-icons-png.flaticon.com/512/3075/3075977.png";
}

}
function downloadDesign(){

var dataURL = canvas.toDataURL({
format:'png'
});

var link=document.createElement('a');

link.href=dataURL;

link.download="my-design.png";

link.click();

}

</script>

</body>
</html>
