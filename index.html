<!DOCTYPE html>
<html>
<head>
<title>Customix Clothing Platform</title>

<style>

body{
font-family: Arial;
text-align:center;
background:#f4f4f4;
margin:0;
}

header{
background:#111;
color:white;
padding :20px;
}

.hero{
padding :60px;
}

button{
padding :15px 25px;
background:#ff4c4c;
color:white;
border:none;
font-size:18px;
cursor:pointer;
border-radius:6px;
}

button:hover{
background:#ff2a2a;
}

</style>

</head>

<body>

<header>
<h1>Customix</h1>
<p>AI Powered Custom Clothing Platform</p>
</header>

<div class="hero">

<h2>Design Your Own T-Shirt</h2>

<p>Create custom designs with AI and preview them in 3D.</p>

<button>Start Designing</button>

</div>
<h2>Design Area</h2>

<div style="position:relative;width :400px;height :400px;margin :auto">

<img src="https://upload.wikimedia.org/wikipedia/commons/8/89/Tshirt.svg"
style="position:absolute;width:400px;height:400px;left:0;top:0;">

<canvas id="designCanvas" width="400" height="400" style="position:absolute;left:0;top:0;"></canvas>

</div>
<br><br>

<button onclick="addText()">Add Text</button>
<input type="file" id="uploadImage">
  <button onclick="addImage()">Add Image</button>
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.2.4/fabric.min.js"></script>

<script>

var canvas = new fabric.Canvas('designCanvas');

function addText() {

var text = new fabric.Text('Your Design', {
left: 150,
top: 150,
fontSize: 30
});

canvas.add(text);

}
function addImage() {

var input = document.getElementById("uploadImage");

var reader = new FileReader();

reader.onload = function (event) {

fabric.Image.fromURL(event.target.result, function(img) {

img.scaleToWidth(150);

canvas.add(img);

});

}

reader.readAsDataURL(input.files[0]);

}
</script>
</body>
</html>
